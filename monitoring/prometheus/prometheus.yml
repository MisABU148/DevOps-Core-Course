global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "devops-monitor"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
          environment: "monitoring"

  - job_name: "app"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["python-app:5000"]
        labels:
          service: "devops-app"
          environment: "production"
          language: "python"

  - job_name: "loki"
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: "loki"
          environment: "monitoring"

  - job_name: "grafana"
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: "grafana"
          environment: "monitoring"