apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: 3
  revisionHistoryLimit: 2

  selector:
    matchLabels:
      app: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 80

  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: {}

        - setWeight: 40
        - pause:
            duration: 30s

        - setWeight: 60
        - pause:
            duration: 30s

        - setWeight: 80
        - pause:
            duration: 30s

        - setWeight: 100