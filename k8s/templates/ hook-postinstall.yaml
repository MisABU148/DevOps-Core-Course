apiVersion: batch/v1
kind: Job
metadata:
  name: python-app-postinstall
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: postinstall
          image: busybox
          command: ["sh", "-c", "echo Post-install smoke test OK"]