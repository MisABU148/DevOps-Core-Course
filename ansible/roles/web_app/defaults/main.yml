web_app_wipe: false

# Additional options
# Set to true to also remove Docker images (saves disk space but slower reinstall)
web_app_wipe_images: false

# Application defaults (can be overridden in group_vars)
app_name: devops-app
docker_image: mariablood/devops-info-service
docker_tag: latest
app_port: 5000
app_internal_port: 8000

# Environment variables
environment_variables:
  TZ: "UTC"
  LOG_LEVEL: "info"