---
- name: Common role tasks
  block:
    - name: Package installation tasks
      block:
        - name: Update apt cache
          apt:
            update_cache: yes
            cache_valid_time: 3600
          register: apt_update_result
          tags: packages

        - name: Install common packages
          apt:
            name:
              - curl
              - wget
              - git
              - vim
              - htop
              - tree
            state: present
          tags: packages

      rescue:
        - name: Fix apt cache on failure
          command: apt-get update --fix-missing
          register: fix_missing_result
          changed_when: false
          tags: packages

        - name: Retry package installation
          apt:
            name:
              - curl
              - wget
              - git
              - vim
              - htop
              - tree
            state: present
          when: fix_missing_result is success
          tags: packages

      tags: packages

    - name: User management tasks
      block:
        - name: Create application user
          user:
            name: "{{ ansible_user | default('appuser') }}"
            state: present
            shell: /bin/bash
            groups: sudo
            append: yes
          tags: users

        - name: Set up user SSH directory
          file:
            path: "/home/{{ ansible_user | default('appuser') }}/.ssh"
            state: directory
            mode: '0700'
            owner: "{{ ansible_user | default('appuser') }}"
            group: "{{ ansible_user | default('appuser') }}"
          tags: users

      tags: users

  always:
    - name: Log completion to /tmp
      copy:
        content: |
          Common role completed at {{ ansible_date_time.iso8601 }}
          Host: {{ ansible_hostname }}
          OS: {{ ansible_os_family }}
        dest: "/tmp/common_role_completed_{{ ansible_date_time.epoch }}.log"
        mode: '0644'
      tags: common

  become: true
  tags: common
